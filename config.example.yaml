# Model provider: "mistral" (cloud), "local" (OpenAI-compatible API), or "gigachat"
provider: "mistral"

# Mistral Cloud Settings (used when provider: "mistral")
mistral:
  api_key: "your-mistral-api-key"
  model: "mistral-medium-latest"

# Local Model Settings (used when provider: "local")
# Works with Ollama, LM Studio, vLLM, or any OpenAI-compatible API
local:
  base_url: "http://localhost:11434/v1"  # Ollama default
  model: "llama3.2"
  api_key: "ollama"  # Some servers require a dummy key

# GigaChat Settings (used when provider: "gigachat")
gigachat:
  base_url: ""      # GIGACHAT_API_URL env var or explicit URL
  access_token: ""  #   env var or explicit token
  model: "GigaChat-Pro"

# RAG Configuration
rag:
  docs_dir: "PM_Platform_docs"
  embedding_model_path: "models/multilingual-e5-large"
